<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>SIFAS 2026 现货表</title>
<style>
:root{--sand:#f5f1eb;--sand-dark:#e8e2d9;--ink:#1a1814;--ink-mid:#4a4540;--ink-light:#8a8480;--ink-faint:#c5c0bb;--accent:#b8986a;--accent-light:#f0e8d8;--green:#2d4a3e;--green-light:#e8f0ec;--amber:#7a5c28;--amber-light:#faf0dc;--red:#6b2d2d;--red-light:#f5e8e8;--white:#fff;--r:2px;--rlg:4px}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'PingFang SC','Helvetica Neue',Arial,sans-serif;background:var(--sand);color:var(--ink);min-height:100vh}
.header{background:var(--ink);padding:20px 20px 16px;position:sticky;top:0;z-index:100}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.logo{letter-spacing:.3em;font-size:18px;font-weight:300;color:#fff}
.logo span{color:var(--accent)}
.admbtn{font-size:11px;letter-spacing:.08em;color:var(--ink-faint);border:.5px solid rgba(255,255,255,.15);background:transparent;cursor:pointer;padding:6px 12px;border-radius:var(--r);transition:all .2s;font-family:inherit}
.admbtn:hover{color:var(--accent);border-color:rgba(184,152,106,.5)}
.sw{position:relative;margin-bottom:14px}
.sw input{width:100%;padding:9px 14px 9px 36px;background:rgba(255,255,255,.06);border:.5px solid rgba(255,255,255,.12);border-radius:var(--r);color:#fff;font-size:13px;outline:none;font-family:inherit}
.sw input::placeholder{color:rgba(255,255,255,.3)}
.sw input:focus{border-color:var(--accent)}
.si{position:absolute;left:12px;top:50%;transform:translateY(-50%);opacity:.35;pointer-events:none}
.filters{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none}
.filters::-webkit-scrollbar{display:none}
.ftag{white-space:nowrap;font-size:10px;letter-spacing:.1em;padding:5px 12px;border-radius:20px;border:.5px solid rgba(255,255,255,.2);color:rgba(255,255,255,.5);background:transparent;cursor:pointer;transition:all .18s}
.ftag.active{background:var(--accent);color:var(--ink);border-color:var(--accent);font-weight:500}
.ftag:hover:not(.active){color:rgba(255,255,255,.85);border-color:rgba(255,255,255,.4)}







.cl{padding:16px 20px 10px;font-size:9px;letter-spacing:.3em;font-weight:500;color:var(--ink-light);text-transform:uppercase;display:flex;align-items:center;gap:10px;flex-wrap:nowrap}
.cl::after{content:'';flex:1;height:.5px;background:var(--ink-faint)}
.cc{font-size:9px;color:var(--ink-faint);background:var(--sand-dark);padding:2px 7px;border-radius:10px;flex-shrink:0}
.amb-btn{
  font-size:10px;color:var(--accent);cursor:pointer;
  padding:3px 10px;border:1px solid var(--accent);border-radius:12px;
  white-space:nowrap;letter-spacing:.04em;
  transition:all .18s;margin-left:auto;flex-shrink:0;
}
.amb-btn:hover{background:var(--accent);color:var(--ink)}
.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:1px;background:var(--sand-dark)}
.card{background:#fff;padding:14px 13px 13px;position:relative}
.card.disc{opacity:.42}
.ib{width:100%;aspect-ratio:4/3;background:var(--sand);border-radius:var(--r);margin-bottom:11px;display:flex;flex-direction:column;overflow:hidden}

.iph{display:flex;flex-direction:column;align-items:center;gap:5px}
.ipr{width:40px;height:28px;border:1px solid var(--ink-faint);border-radius:2px;position:relative}
.ipr::after{content:'';position:absolute;bottom:-5px;left:50%;transform:translateX(-50%);width:14px;height:4px;background:var(--ink-faint);border-radius:1px}
.ipl{font-size:9px;color:var(--ink-faint);letter-spacing:.06em}
.sb{flex-shrink:0;font-size:12px;letter-spacing:.06em;padding:5px 10px;font-weight:600;display:flex;align-items:center;justify-content:space-between}
.si2{background:#2d6a4f;color:#fff}
.sp{background:#9a6b1a;color:#fff}
.sd{background:#8b1a1a;color:#fff}
.cr{font-size:9px;letter-spacing:.15em;color:var(--ink-light);margin-bottom:3px;text-transform:uppercase}
.ct{font-size:12px;color:var(--ink);line-height:1.35;margin-bottom:5px}
.cd{font-size:10px;color:var(--ink-light);margin-bottom:8px}
.cf{display:flex;align-items:flex-end;justify-content:space-between;gap:4px}
.cp{font-size:15px;color:var(--ink);font-weight:300}
.cdl{font-size:9px;color:var(--amber);background:var(--amber-light);padding:2px 7px;border-radius:2px;letter-spacing:.06em;white-space:nowrap}
.cdsc{font-size:9px;color:var(--red);letter-spacing:.06em}
.empty{padding:60px 20px;text-align:center;color:var(--ink-light);font-size:13px}
.mo{display:none;position:fixed;inset:0;z-index:500;background:rgba(20,18,15,.75);align-items:center;justify-content:center}
.mo.show{display:flex}
.mb{background:var(--ink);border-radius:6px;padding:32px 28px;width:288px;border:.5px solid rgba(255,255,255,.12)}
.mt{font-size:11px;letter-spacing:.2em;color:var(--accent);margin-bottom:6px;text-transform:uppercase}
.ms{font-size:12px;color:rgba(255,255,255,.4);margin-bottom:20px;line-height:1.6}
.mi{width:100%;padding:10px 14px;background:rgba(255,255,255,.07);border:.5px solid rgba(255,255,255,.2);border-radius:var(--r);color:#fff;font-size:16px;outline:none;letter-spacing:.15em;margin-bottom:12px;font-family:inherit}
.mi:focus{border-color:var(--accent)}
.mi.err{border-color:#c0392b;animation:shake .3s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.mbt{width:100%;padding:11px;background:var(--accent);color:var(--ink);border:none;border-radius:var(--r);font-size:12px;letter-spacing:.15em;cursor:pointer;font-weight:500;font-family:inherit;margin-bottom:8px}
.mbt:active{opacity:.85}
.mca{width:100%;padding:8px;background:transparent;color:rgba(255,255,255,.3);border:none;font-size:11px;cursor:pointer;font-family:inherit;letter-spacing:.08em}
.mer{font-size:11px;color:#e74c3c;text-align:center;margin-bottom:10px;min-height:16px}
.ap{background:var(--ink);border-top:1px solid rgba(255,255,255,.08)}
.ah{padding:16px 20px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:.5px solid rgba(255,255,255,.08)}
.at{font-size:9px;letter-spacing:.25em;color:var(--accent);text-transform:uppercase}
.acb{font-size:11px;color:rgba(255,255,255,.3);background:transparent;border:none;cursor:pointer;padding:4px 8px;font-family:inherit;letter-spacing:.06em}
.acb:hover{color:rgba(255,255,255,.6)}
.ast{padding:10px 20px 6px;font-size:9px;letter-spacing:.2em;color:rgba(255,255,255,.25);text-transform:uppercase;border-bottom:.5px solid rgba(255,255,255,.05)}
.ar{display:flex;align-items:center;gap:8px;padding:9px 20px;border-bottom:.5px solid rgba(255,255,255,.05)}
.aref{font-size:10px;letter-spacing:.1em;color:rgba(255,255,255,.4);width:88px;flex-shrink:0;text-transform:uppercase}
.an{font-size:11px;color:rgba(255,255,255,.65);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.asel{font-size:11px;padding:6px 8px;background:rgba(255,255,255,.07);border:.5px solid rgba(255,255,255,.15);border-radius:var(--r);color:rgba(255,255,255,.9);cursor:pointer;outline:none;flex-shrink:0;font-family:inherit;-webkit-appearance:none;appearance:none}
.asel:focus{border-color:var(--accent)}
.adel{font-size:11px;padding:6px 8px;width:72px;flex-shrink:0;background:rgba(255,255,255,.07);border:.5px solid rgba(255,255,255,.15);border-radius:var(--r);color:rgba(255,255,255,.9);outline:none;font-family:inherit}
.adel:focus{border-color:var(--accent)}
.apr:focus{border-color:var(--accent)}
.apr-reset:hover{color:var(--accent);border-color:rgba(184,152,106,.5)}
.adel::placeholder{color:rgba(255,255,255,.2)}
.af{padding:16px 20px}
.asv{width:100%;padding:11px;background:var(--accent);color:var(--ink);border:none;border-radius:var(--r);font-size:11px;letter-spacing:.15em;cursor:pointer;font-weight:500;font-family:inherit;margin-bottom:10px}
.asv:active{opacity:.85}
.an2{font-size:10px;color:rgba(255,255,255,.2);line-height:1.7}
.footer{padding:24px 20px;text-align:center;font-size:9px;letter-spacing:.2em;color:var(--ink-faint);text-transform:uppercase}

/* ── iPad 响应式 ── */
@media (min-width:768px){
  .grid{grid-template-columns:repeat(3,minmax(0,1fr));}
  .header{padding:20px 28px 16px;}
  .legend{padding:10px 28px;}
  .cl{padding:16px 28px 10px;}
  .card{padding:16px 14px 14px;}
  .card-type{font-size:13px;}
  .card-price{font-size:16px;}
}
@media (min-width:1024px){
  .grid{grid-template-columns:repeat(4,minmax(0,1fr));}
}

/* ── 实景提示角标 ── */
.amb-hint{
  position:absolute;bottom:8px;right:8px;
  font-size:10px;color:rgba(255,255,255,.9);
  background:rgba(0,0,0,.45);padding:3px 8px;
  border-radius:10px;letter-spacing:.04em;pointer-events:none;
}

/* ── 灯箱 ── */
.lb{
  display:none;position:fixed;inset:0;z-index:999;
  background:rgba(0,0,0,.92);
  align-items:center;justify-content:center;
}
.lb.show{display:flex;}
.lb-content{
  position:relative;max-width:90vw;max-height:88vh;
  display:flex;flex-direction:column;align-items:center;gap:10px;
}
.lb-content img{
  max-width:90vw;max-height:78vh;
  object-fit:contain;border-radius:4px;
  user-select:none;-webkit-user-drag:none;
}
.lb-cap{
  font-size:11px;letter-spacing:.12em;color:rgba(255,255,255,.5);
  text-transform:uppercase;
}
.lb-dots{display:flex;gap:6px;justify-content:center;}
.lbd{
  width:6px;height:6px;border-radius:50%;
  background:rgba(255,255,255,.3);cursor:pointer;transition:background .2s;
}
.lbd.on{background:#fff;}
.lb-nav{
  position:absolute;top:50%;transform:translateY(-50%);
  width:44px;height:44px;border-radius:50%;
  background:rgba(255,255,255,.12);border:none;color:#fff;
  font-size:28px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:background .2s;z-index:10;
}
.lb-nav:hover{background:rgba(255,255,255,.25);}
.lb-prev{left:-52px;}
.lb-next{right:-52px;}
@media(max-width:600px){
  .lb-prev{left:6px;}
  .lb-next{right:6px;}
  .lb-content{max-width:100vw;}
}
.lb-close{
  position:fixed;top:16px;right:16px;
  width:36px;height:36px;border-radius:50%;
  background:rgba(255,255,255,.15);border:none;color:#fff;
  font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;
}
.lb-close:hover{background:rgba(255,255,255,.3);}

/* ── 只看现货按钮 ── */
.stock-btn{
  font-size:11px;letter-spacing:.08em;
  padding:6px 14px;border-radius:20px;
  border:.5px solid rgba(255,255,255,.25);
  background:transparent;color:rgba(255,255,255,.55);
  cursor:pointer;white-space:nowrap;transition:all .18s;
  font-family:inherit;
}
.stock-btn.active{
  background:#2d6a4f;color:#fff;border-color:#2d6a4f;font-weight:500;
}
.stock-btn:hover:not(.active){color:rgba(255,255,255,.85);}
</style>
</head>
<body>
<div class="mo" id="mo">

    <div class="mt">管理员验证</div>

    <div class="mer" id="pe"></div>
    <button class="mbt" onclick="chkPwd()">确认进入</button>
    <button class="mca" onclick="closeMo()">取消</button>
  </div>
</div>

<!-- 灯箱 -->
<div id="lb" class="lb" onclick="closeLightbox()">
  <button id="lbPrev" class="lb-nav lb-prev" onclick="event.stopPropagation();lbNav(-1)">&#8249;</button>
  <div class="lb-content" onclick="event.stopPropagation()" ontouchstart="lbTouchStart(event)" ontouchend="lbTouchEnd(event)">
    <img id="lbImg" src="" alt="">
    <div id="lbCap" class="lb-cap"></div>
    <div id="lbDots" class="lb-dots"></div>
  </div>
  <button id="lbNext" class="lb-nav lb-next" onclick="event.stopPropagation();lbNav(1)">&#8250;</button>
  <button class="lb-close" onclick="closeLightbox()">×</button>
</div>

<div class="header">

  </div>
  <div class="sw">

  <div style="display:flex;align-items:center;gap:8px;margin-top:10px;">
  <button class="stock-btn" id="stockBtn" onclick="toggleOnlyInStock()">只看现货</button>
  <div class="filters" id="fb" style="margin-top:0;flex:1;overflow-x:auto;"></div>
</div>
</div>
<div id="cat"></div>
<div id="adm"></div>
<div class="footer">SIFAS 法国家具 · 2026 现货表</div>

// ── 状态管理：JSONBin实时同步 ──
let stMap={};
let BIN_ID=localStorage.getItem('sifas_bin_id')||'';

// 初始化所有产品默认状态
function initDefaults(){
  RAW.forEach(p=>{
    if(!stMap[p.ref]) stMap[p.ref]={status:'in_stock',delivery:'',qty:''};
  });
}

// 从JSONBin拉取最新状态
async function fetchStatus(){
  // 先用默认值立即渲染，不阻塞页面
  initDefaults();
  render();
  if(!BIN_ID) return;
  // 后台静默拉取最新状态
  try{
    const r=await fetch(BIN_URL+BIN_ID+'/latest',{
      headers:{'X-Master-Key':BIN_KEY,'X-Bin-Meta':'false'}
    });
    if(r.ok){
      const d=await r.json();
      stMap=d||{};
      initDefaults();
      render();
    }
  }catch(e){/* 网络失败静默处理 */}
}

// 保存状态到JSONBin
async function saveStatus(){
  const body=JSON.stringify(stMap);
  try{
    if(!BIN_ID){
      // 首次创建bin
      const r=await fetch('https://api.jsonbin.io/v3/b',{
        method:'POST',
        headers:{'Content-Type':'application/json','X-Master-Key':BIN_KEY,'X-Bin-Name':'sifas-status','X-Bin-Private':'true'},
        body
      });
      if(r.ok){
        const d=await r.json();
        BIN_ID=d.metadata.id;
        localStorage.setItem('sifas_bin_id',BIN_ID);
      }
    } else {
      await fetch(BIN_URL+BIN_ID,{
        method:'PUT',
        headers:{'Content-Type':'application/json','X-Master-Key':BIN_KEY},
        body
      });
    }
  }catch(e){console.error('Save failed',e);}
}

let lbImgs=[], lbIdx=0, lbStartX=0;

function openLightbox(ref, col){

  COLS.push(name);

function delCol(c){
  if(!confirm(`确定删除系列「${c}」及其 ${RAW.filter(p=>p.c===c).length} 款产品？`)) return;
  // 从RAW移除该系列所有产品
  for(let i=RAW.length-1;i>=0;i--){if(RAW[i].c===c)RAW.splice(i,1);}
  // 从COLS移除
  const idx=COLS.indexOf(c);
  if(idx>-1)COLS.splice(idx,1);
  // 如果当前筛选的就是被删除的系列，重置
  if(aFilter===c) aFilter='全部';
  render();
  renderAdmCols();
}

    return `<div style="display:flex;align-items:center;gap:8px;padding:8px 20px;border-bottom:.5px solid rgba(255,255,255,.06);flex-wrap:wrap;row-gap:6px;">
      <span style="font-size:10px;color:var(--accent);letter-spacing:.06em;min-width:70px;">${p.ref}</span>
      <span style="font-size:10px;color:rgba(255,255,255,.35);min-width:60px;">${p.c}</span>
      <input data-pidx="${realIdx}" data-field="type" value="${p.type}" style="flex:1;min-width:100px;font-size:12px;padding:5px 8px;background:rgba(255,255,255,.07);border:.5px solid rgba(255,255,255,.12);border-radius:var(--r);color:rgba(255,255,255,.85);outline:none;font-family:inherit;" oninput="updProdField(this)" placeholder="产品名称">
      <input data-pidx="${realIdx}" data-field="dims" value="${p.dims}" style="width:140px;font-size:11px;padding:5px 8px;background:rgba(255,255,255,.07);border:.5px solid rgba(255,255,255,.12);border-radius:var(--r);color:rgba(255,255,255,.6);outline:none;font-family:inherit;" oninput="updProdField(this)" placeholder="尺寸">
      <input data-pidx="${realIdx}" data-field="price" value="${p.price}" style="width:90px;font-size:11px;padding:5px 8px;background:rgba(255,255,255,.07);border:.5px solid rgba(255,255,255,.12);border-radius:var(--r);color:rgba(255,255,255,.6);outline:none;font-family:inherit;" oninput="updProdField(this)" placeholder="价格">
      <button onclick="delProd(${realIdx})" style="font-size:10px;padding:4px 8px;background:transparent;border:.5px solid rgba(180,80,80,.5);color:rgba(220,120,120,.8);border-radius:var(--r);cursor:pointer;font-family:inherit;">删除</button>
    </div>`;
  }).join('');

  // 新增产品表单
  const addForm=`<div style="padding:14px 20px;border-top:.5px solid rgba(255,255,255,.1);margin-top:8px;">
    <p style="font-size:10px;color:rgba(255,255,255,.3);margin-bottom:8px;letter-spacing:.06em;">— 新增产品 —</p>
    <div style="display:flex;gap:6px;flex-wrap:wrap;">
      <select id="newProdCol" style="font-size:11px;padding:6px 8px;background:rgba(255,255,255,.07);border:.5px solid rgba(255,255,255,.2);border-radius:var(--r);color:rgba(255,255,255,.8);outline:none;font-family:inherit;">
        ${colList.map(c=>`<option value="${c}"${prodFilterCol===c?' selected':''}>${c}</option>`).join('')}
      </select>
      <input id="newProdRef" placeholder="编号 REF" style="width:90px;font-size:11px;padding:6px 8px;background:rgba(255,255,255,.07);border:.5px solid rgba(255,255,255,.2);border-radius:var(--r);color:#fff;outline:none;font-family:inherit;">
      <input id="newProdType" placeholder="产品名称" style="flex:1;min-width:100px;font-size:11px;padding:6px 8px;background:rgba(255,255,255,.07);border:.5px solid rgba(255,255,255,.2);border-radius:var(--r);color:#fff;outline:none;font-family:inherit;">
      <input id="newProdDims" placeholder="尺寸" style="width:130px;font-size:11px;padding:6px 8px;background:rgba(255,255,255,.07);border:.5px solid rgba(255,255,255,.2);border-radius:var(--r);color:#fff;outline:none;font-family:inherit;">
      <input id="newProdPrice" placeholder="价格 ¥0,000" style="width:100px;font-size:11px;padding:6px 8px;background:rgba(255,255,255,.07);border:.5px solid rgba(255,255,255,.2);border-radius:var(--r);color:#fff;outline:none;font-family:inherit;">
      <button onclick="addProd()" style="font-size:11px;padding:6px 14px;background:rgba(184,152,106,.2);border:.5px solid var(--accent);color:var(--accent);border-radius:var(--r);cursor:pointer;font-family:inherit;letter-spacing:.04em;white-space:nowrap;">+ 添加</button>
    </div>
  </div>`;

  const inner=`
    <div style="display:flex;gap:6px;padding:10px 20px 8px;overflow-x:auto;scrollbar-width:none;">${colTabs}</div>
    <div style="font-size:10px;color:rgba(255,255,255,.25);padding:0 20px 6px;letter-spacing:.04em;">共 ${filtered.length} 款 · 修改后记得点底部「保存」</div>
    ${prodRows}
    ${addForm}
    <div class="af">
      <button class="asv" onclick="saveAdm()">保存并同步给所有代理</button>
      <p class="an2">点击保存后，所有代理刷新页面即可看到最新库存状态。</p>
    </div>`;
  document.getElementById('adm').innerHTML=admShell(inner);
}

function updProdField(inp){
  const idx=parseInt(inp.getAttribute('data-pidx'));
  const field=inp.getAttribute('data-field');
  if(RAW[idx]) RAW[idx][field]=inp.value;
}

function delProd(idx){
  if(!confirm(`确定删除产品「${RAW[idx].ref} ${RAW[idx].type}」？`)) return;
  RAW.splice(idx,1);
  render();
  renderAdmProducts();
}

function addProd(){
  const col=document.getElementById('newProdCol').value;
  const ref=(document.getElementById('newProdRef').value||'').trim().toUpperCase();
  const type=(document.getElementById('newProdType').value||'').trim();
  const dims=(document.getElementById('newProdDims').value||'').trim();
  const price=(document.getElementById('newProdPrice').value||'').trim();
  if(!ref||!type){
    alert('编号和产品名称不能为空');return;
  }
  if(RAW.find(p=>p.ref===ref)){alert(`编号 ${ref} 已存在`);return;}
  RAW.push({c:col,ref,type,dims,price:price||'—'});
  if(!COLS.includes(col)) COLS.push(col);
  prodFilterCol=col;
  render();
  renderAdmProducts();
}

function updSt(sel){
  const ref=sel.getAttribute('data-ref');
  const val=sel.value;
  if(!stMap[ref])stMap[ref]={status:'in_stock',delivery:'',qty:''};
  stMap[ref].status=val;
  if(val!=='producing')stMap[ref].delivery='';
  if(val!=='in_stock')stMap[ref].qty='';
  const p=RAW.find(x=>x.ref===ref);
  render();
  openAdm();
  if(p) setTimeout(()=>scrollToAdmCol(p.c),50);
}
function updField(inp){
  const ref=inp.getAttribute('data-ref');
  const field=inp.getAttribute('data-field')||'delivery';
  if(!stMap[ref])stMap[ref]={status:'in_stock',delivery:'',qty:''};
  stMap[ref][field]=inp.value;
}
function updPrice(inp){
  const ref=inp.getAttribute('data-ref');
  if(!stMap[ref])stMap[ref]={status:'in_stock',delivery:'',qty:''};
  let v=inp.value.trim();
  if(!v){delete stMap[ref].price;return;}
  // 允许输入纯数字(如 26420)或带格式(如 ¥26,420 / 26,420)
  const digits=v.replace(/[^\d]/g,'');
  if(!digits){delete stMap[ref].price;return;}
  stMap[ref].price='¥'+parseInt(digits,10).toLocaleString('en-US');
}
function resetPrice(ref){
  if(stMap[ref]){delete stMap[ref].price;}
  const inp=document.querySelector(`input.apr[data-ref="${ref}"]`);
  if(inp){inp.value='';}
  render();
}
function updImg(input){
  const ref=input.getAttribute('data-ref');
  const file=input.files[0];
  if(!file) return;
  const reader=new FileReader();
  reader.onload=e=>{
    if(!stMap[ref]) stMap[ref]={status:'in_stock',delivery:'',qty:''};
    stMap[ref].img=e.target.result;
    const p=RAW.find(x=>x.ref===ref);
    render();
    openAdm();
    if(p) setTimeout(()=>scrollToAdmCol(p.c),50);
  };
  reader.readAsDataURL(file);
}
function resetImg(ref){
  if(stMap[ref]) delete stMap[ref].img;
  const p=RAW.find(x=>x.ref===ref);
  render();
  openAdm();
  if(p) setTimeout(()=>scrollToAdmCol(p.c),50);
}
async function saveAdm(){
  const btn=document.querySelector('.asv');
  btn.textContent='保存中…';btn.disabled=true;
  await saveStatus();
  btn.textContent='✓ 已同步';
  setTimeout(()=>{render();toggleAdm();window.scrollTo({top:0,behavior:'smooth'});},800);
}

fetchStatus();
</script></body></html>
